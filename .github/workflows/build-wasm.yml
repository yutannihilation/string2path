on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: Build WASM

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout calling repository
        uses: actions/checkout@v6

      - name: Build wasm packages
        uses: r-wasm/actions/build-rwasm@v2
        with:
          packages: |
            local::.
