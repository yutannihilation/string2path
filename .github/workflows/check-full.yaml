on:
  push:
    branches: [tmp-various-rust-versions]
  pull_request:
    branches: [tmp-various-rust-versions]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: "${{ matrix.config.os }} (R: ${{ matrix.config.r }}, Rust: ${{ matrix.config.rust }})"

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: windows-latest, r: 'release',  rust: '1.69.0'}
          - {os: windows-latest, r: 'release',  rust: '1.68.0'}
          - {os: windows-latest, r: 'release',  rust: '1.67.0'}
          - {os: windows-latest, r: 'release',  rust: '1.66.0'}
          - {os: windows-latest, r: 'release',  rust: '1.65.0'}
          - {os: windows-latest, r: 'release',  rust: '1.64.0'}
          - {os: windows-latest, r: 'release',  rust: '1.63.0'}
          - {os: windows-latest, r: 'release',  rust: '1.62.0'}

    steps:
      - uses: actions/checkout@v3

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.config.rust }}
          targets: x86_64-pc-windows-gnu

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          rtools-version: ${{ matrix.config.rtools-version }}
          # TODO: Enable RSPM where possible
          use-public-rspm: false
          # use-public-rspm: ${{ matrix.config.r != 'devel' }}

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2

      - name: debug
        run: cat ./check/*.Rcheck/00install.out
